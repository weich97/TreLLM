[build-system]
requires = ["setuptools>=82.0.1"]
build-backend = "setuptools.build_meta"

[project]
name = "tradearena"
version = "0.1.1"
description = "Auditable benchmark for LLM trading agents with realistic execution, risk gates, and replayable trajectories."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Trading Agent OS Contributors" }]
license = "MIT"
dependencies = []

[project.urls]
Homepage = "https://github.com/weich97/TradeArena"
Repository = "https://github.com/weich97/TradeArena"
Documentation = "https://github.com/weich97/TradeArena/blob/main/docs/getting_started.md"
Issues = "https://github.com/weich97/TradeArena/issues"

[project.optional-dependencies]
data = ["pandas>=2.3.3", "yfinance>=1.3.0"]
dev = ["pytest>=9.0.3", "pytest-cov>=7.1.0", "pillow>=12.2.0", "ruff>=0.15.13"]
embeddings = ["sentence-transformers>=5.5.0"]
ashare = ["akshare>=1.18.60"]

[project.scripts]
taos-run-benchmark = "trading_agent_os.cli:main"
tradearena = "tradearena.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]
