<rect x="818" y="132" width="166" height="8" rx="4" fill="#ea580c"/>
<text x="832" y="164" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#ea580c">5. You add</text>
<text x="832" y="190" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#0f172a">Evaluator plugin</text>
<text x="832" y="216" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="500" fill="#475569">ExtensionCoverageEvalua.</text>
<text x="42" y="320" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#0f172a">What the contributor gets automatically</text>
<text x="42" y="346" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="500" fill="#64748b">Metrics, risk reports, execution realism, memory events, and reproducible trajectory fields are produced without modifying the core runner.</text>
