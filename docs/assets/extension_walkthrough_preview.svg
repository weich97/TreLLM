<text x="778" y="408" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="800" fill="#64748b">Audit coverage</text>
<text x="778" y="446" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="800" fill="#0f766e">1.000</text>
