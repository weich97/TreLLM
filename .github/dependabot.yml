version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 4
    groups:
      python-data:
        patterns:
          - "pandas"
          - "yfinance"
          - "akshare"
      python-dev-tools:
        patterns:
          - "pytest"
          - "pytest-cov"
          - "pillow"
          - "ruff"
          - "mypy"
          - "hypothesis"
          - "jsonschema"
      python-embeddings:
        patterns:
          - "sentence-transformers"
      python-build:
        patterns:
          - "setuptools"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
