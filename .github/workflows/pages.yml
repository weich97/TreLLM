name: Pages Demo

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'weich97/TradeArena'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Build quickstart showcase
        run: python scripts/run_showcase.py
      - name: Prepare Pages artifact
        run: |
          touch outputs/examples/.nojekyll
          cat > outputs/examples/README.txt <<'EOF'
          TradeArena static demo generated by:
            python scripts/run_showcase.py

          Entry points:
            index.html
            showcase.html
            benchmark-v0.1.html
            audit_report.html
            crisis_snapshot_gallery.html
            retail_planning_report.html
          EOF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/examples

  deploy:
    if: github.repository == 'weich97/TradeArena'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
